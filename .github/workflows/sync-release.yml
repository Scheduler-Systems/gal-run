name: Sync Release

on:
  repository_dispatch:
    types: [cli-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'CLI version to update'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ci-standard-runc
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in README
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/gal@[0-9]*\.[0-9]*\.[0-9]*/gal@${VERSION}/g" README.md
          sed -i "s/gal\/v[0-9]*\.[0-9]*\.[0-9]*/gal\/v${VERSION}/g" README.md

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md; then
            {
              head -1 CHANGELOG.md
              echo ""
              echo "## [$VERSION] - $DATE"
              echo ""
              echo "- See [npm package](https://www.npmjs.com/package/@scheduler-systems/gal-run/v/$VERSION) for details"
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          fi

      - name: Commit and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          if ! git diff --staged --quiet; then
            BRANCH="release/v${VERSION}"
            git checkout -b "$BRANCH"
            git commit -m "Release v$VERSION"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            git push origin "$BRANCH" --force
            EXISTING_PR=$(gh pr list --repo "${{ github.repository }}" --head "$BRANCH" --base main --state open --json url --jq '.[0].url')
            if [ -n "$EXISTING_PR" ]; then
              echo "Release PR already open: $EXISTING_PR"
            else
              gh pr create --base main --head "$BRANCH" \
                --title "Release v$VERSION" \
                --body "Automated release version update. Manual review is required before merge." \
                --repo "${{ github.repository }}"
            fi
          else
            echo "No changes to commit - version already up to date"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Skip if release already exists
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists, skipping"
          else
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --notes "Install or update: \`npm install -g @scheduler-systems/gal-run\`

          See [npm package](https://www.npmjs.com/package/@scheduler-systems/gal-run/v/$VERSION) for details."
          fi
