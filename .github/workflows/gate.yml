name: Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ format('{0}-{1}-pr-{2}', github.repository, github.workflow, github.event.pull_request.number) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    needs: [runner-policy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce runner-policy result
        env:
          RUNNER_POLICY_RESULT: ${{ needs.runner-policy.result }}
        run: |
          case "$RUNNER_POLICY_RESULT" in
            success|skipped)
              echo "Runner policy passed"
              ;;
            *)
              echo "runner-policy failed with result: $RUNNER_POLICY_RESULT"
              exit 1
              ;;
          esac

      - uses: actions/checkout@v6

      - name: Public surface check
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            --exclude='gate.yml' \
            --exclude='issue-public-surface-check.yml' \
            'Scheduler-Systems/infra|gal-run-private|arc-linux|ci-standard-runc|docker-dind-x64|macos-host|bare-high-arm64|ARC_APP_ID|ARC_PRIVATE_KEY|gs://gal' \
            .github README.md CHANGELOG.md; then
            echo "::error::Public repo contains internal-only references. Remove private repo links, private runner labels, secret names, and internal infrastructure details."
            exit 1
          fi

          echo "Public surface clean."

  runner-policy:
    if: ${{ !cancelled() }}
    uses: Scheduler-Systems/infra/.github/workflows/runner-policy-check.yml@main
    permissions:
      contents: read
    secrets: inherit
